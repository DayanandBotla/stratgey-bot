# ╔══════════════════════════════════════════════════════════════╗
# ║  Nginx reverse proxy for AutoTrade Bot                       ║
# ║  File: /etc/nginx/sites-available/autotrade                  ║
# ╚══════════════════════════════════════════════════════════════╝
#
# After copying:
#   ln -s /etc/nginx/sites-available/autotrade /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    # Replace with your VPS IP or domain name
    server_name YOUR_HETZNER_IP_HERE;

    # ── API (bot backend) ──────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # CORS (also handled by FastAPI but belt-and-suspenders)
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
    }

    # ── Dashboard (static HTML) ────────────────────────────────
    location / {
        root  /root/autotrade;
        index bot_dashboard.html;
        try_files $uri $uri/ /bot_dashboard.html;

        # Cache static assets
        location ~* \.(css|js|png|jpg|gif|ico)$ {
            expires 1d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # ── Security headers ───────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy       "no-referrer";

    # Block common exploit paths
    location ~ /\. { deny all; }
    location = /favicon.ico { access_log off; log_not_found off; }
}
